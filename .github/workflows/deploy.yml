name: Push2EC2

run-name: ${{github.actor}} deploy to ec2

on:
  push:
    branches: main

jobs:  
  deploy:
    name: Deply | Push Backend-img to DockerHub
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup cloudflared
        uses: AnimMouse/setup-cloudflared@v2

      - name: Cloudflared-Version
        run: cloudflared --version

      - name: Configure SSH and Keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          cat << 'EOF' >> ~/.ssh/config
          Host ${{ secrets.EC2_HOST }}
            IdentityFile ~/.ssh/id_rsa
            ProxyCommand cloudflared access ssh --hostname %h --header "CF-Access-Client-Id=${{ secrets.AUTH_TOKEN_ID }}" --header "CF-Access-Client-Secret=${{ secrets.AUTH_TOKEN_SECRET }}"
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: SSH Remote Commands
        run: |
            ssh ${{ secrets.SSH_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
              mkdir -p ~/contint-ex13
              cd ~/contint-ex13
              echo "Success" > test.txt
            EOF


              
